{% extends "base.html" %}
{% block title %}Run Templates – Workout Tracker{% endblock %}
{% block content %}

<h1>Run Workout Templates</h1>

<h2>Create Template</h2>
<form hx-post="/run-templates/add"
      hx-target="#template-table"
      hx-swap="outerHTML">
    <label>Name
        <input type="text" name="name" required>
    </label>
    <label>Run Type
        <select name="run_type">
            {% for rt in run_types %}
            <option value="{{ rt }}">{{ rt }}</option>
            {% endfor %}
        </select>
    </label>
    <label>Notes (optional)
        <textarea name="notes" rows="2"></textarea>
    </label>
    <button type="submit">Create Template</button>
</form>

<h2>Your Templates</h2>
{% include "run_templates/partials/template_table.html" %}

{% endblock %}
