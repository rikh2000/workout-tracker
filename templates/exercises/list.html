{% extends "base.html" %}
{% block title %}Exercises – Workout Tracker{% endblock %}
{% block content %}

<h1>Exercise Library</h1>

<h2>Add Exercise</h2>
<form hx-post="/exercises/add"
      hx-target="#exercise-table"
      hx-swap="outerHTML">
    <label>Name
        <input type="text" name="name" required>
    </label>
    <label>Type
        <select name="type">
            {% for t in types %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
        </select>
    </label>
    <div>
        <div class="field-label">Muscle Groups (optional)</div>
        <div class="muscle-chips" id="add-chips">
            {% for mg in muscle_groups_list %}
            <button type="button" class="muscle-chip" data-value="{{ mg }}"
                    onclick="toggleChip(this, 'add-input')">{{ mg }}</button>
            {% endfor %}
        </div>
        <input type="hidden" name="muscle_groups" id="add-input">
    </div>
    <label>Notes (optional)
        <textarea name="notes" rows="2"></textarea>
    </label>
    <button type="submit">Add Exercise</button>
</form>

<h2>All Exercises</h2>
{% include "exercises/partials/exercise_table.html" %}

{% endblock %}
